name: Crawl listings

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup DB schema (idempotent)
        run: npx tsx scripts/setup-db.ts

      - name: Crawl bunjang
        continue-on-error: true
        run: npx tsx crawlers/bunjang.ts

      - name: Crawl joongna
        continue-on-error: true
        run: npx tsx crawlers/joongna.ts

      - name: Crawl daangn
        continue-on-error: true
        run: npx tsx crawlers/daangn.ts

      - name: Crawl clien
        continue-on-error: true
        run: npx tsx crawlers/clien.ts
